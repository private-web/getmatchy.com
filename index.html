<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Chat</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.chat{
    width:100%;
    max-width:400px;
    height:620px;
    background:#1e293b;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#22c55e;
    padding:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
}

.name{font-weight:bold;color:#000;}
.city{font-size:12px;color:#064e3b;}

.progress{
    height:5px;
    background:#0f172a;
}
.bar{
    height:100%;
    width:0%;
    background:#22c55e;
    transition:0.3s;
}

.messages{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg{
    max-width:75%;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    font-size:14px;
}

.left{background:#334155;}
.right{
    background:#22c55e;
    color:#000;
    align-self:flex-end;
}

.typing{
    font-size:12px;
    color:#94a3b8;
    display:none;
    margin-left:10px;
}

.options{padding:10px;}
.option{
    background:#334155;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
}

.cta{
    display:none;
    margin:10px;
    padding:15px;
    background:#22c55e;
    text-align:center;
    border-radius:10px;
    text-decoration:none;
    color:#000;
    font-weight:bold;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.notice{
    font-size:11px;
    text-align:center;
    color:#64748b;
}
</style>
</head>

<body>

<div class="chat">

<div class="header">
    <img id="avatar" class="avatar">
    <div>
        <div class="name" id="name"></div>
        <div class="city" id="city"></div>
    </div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="messages" id="chat"></div>
<div class="typing" id="typing">typing...</div>
<div class="options" id="options"></div>

<a href="https://overestimatecapricornspittle.com/e6vmqt9wj?key=16e6931df1ec0b4d3cbd1dc1d01f39ec" class="cta" id="cta">Continue Now →</a>

<div class="notice">Demo simulation</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
// DATA
const names=["Amara","Chioma","Zainab","Ada","Fatima","Blessing"];
const cities=["Lagos","Abuja","Kano","Ibadan","Port Harcourt"];
const avatars=[
"https://i.pravatar.cc/150?img=5",
"https://i.pravatar.cc/150?img=10",
"https://i.pravatar.cc/150?img=15"
];

// RANDOM
const n=names[Math.floor(Math.random()*names.length)];
const c=cities[Math.floor(Math.random()*cities.length)];
const a=avatars[Math.floor(Math.random()*avatars.length)];

name.innerText=n;
city.innerText=c+" • Active now";
avatar.src=a;

const chat=document.getElementById("chat");
const typing=document.getElementById("typing");
const sound=document.getElementById("sound");
const bar=document.getElementById("bar");

let step=0;

function vib(){ if(navigator.vibrate) navigator.vibrate(50); }

function msg(t,s){
    let d=document.createElement("div");
    d.className="msg "+s;
    d.innerText=t;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
    sound.play();
    vib();
}

function bot(t,next){
    typing.style.display="block";
    setTimeout(()=>{
        typing.style.display="none";
        msg(t,"left");
        step++;
        bar.style.width=(step/6*100)+"%";
        if(next) next();
    },1000+Math.random()*700);
}

function options(arr){
    let box=document.getElementById("options");
    box.innerHTML="";
    arr.forEach(o=>{
        let b=document.createElement("div");
        b.className="option";
        b.innerText=o.text;
        b.onclick=()=>{
            msg(o.text,"right");
            box.innerHTML="";
            setTimeout(o.next,700);
        };
        box.appendChild(b);
    });
}

// FLOW
setTimeout(()=>{
    bot("Hey 🙂",()=>{
        bot("Quick question...",()=>{
            bot("Are you in Nigeria?",()=>{
                options([
                    {text:"Yes",next:step2},
                    {text:"Not really",next:step2}
                ]);
            });
        });
    });
},500);

function step2(){
    bot("Alright 👍",()=>{
        bot("Something is trending right now",()=>{
            bot("Not many people have seen it yet",()=>{
                options([
                    {text:"What is it?",next:step3},
                    {text:"Show me",next:step3}
                ]);
            });
        });
    });
}

function step3(){
    bot("It’s based on your area",()=>{
        bot("You might find it interesting",()=>{
            bot("Check it before it refreshes",()=>{
                document.getElementById("cta").style.display="block";
            });
        });
    });
}
</script>

</body>
</html>
